name: Test
on: push

jobs:
  start:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        pt: [3.12, 3.11, 3.10]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download code
        uses: actions/checkout@v6.0.2
      - name: Get python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.pt }}
      - name: run code
        run: python test.py
